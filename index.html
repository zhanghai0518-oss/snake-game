<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐍 贪吃蛇·动物大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2d5a27;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: 'PingFang SC', Arial, sans-serif;
      overflow: hidden; color: #fff;
    }
    #game-container { position: relative; text-align: center; }
    canvas {
      border: 6px solid #8B5E3C;
      border-radius: 12px;
      display: block; margin: 0 auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 10px rgba(0,0,0,0.1);
    }
    #menu {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(30,70,25,0.92);
      backdrop-filter: blur(8px);
      border-radius: 12px; z-index: 10;
    }
    #menu.hidden { display: none; }
    #menu h1 {
      font-size: 64px; margin-bottom: 5px;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    #menu h2 {
      font-size: 22px; color: #a8e6a0; margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 2px;
    }
    #start-btn {
      padding: 16px 48px; font-size: 22px;
      background: linear-gradient(135deg, #ffcc00, #ff8800);
      color: #5a3000; border: none; border-radius: 30px; cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(255,136,0,0.4), 0 2px 4px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'PingFang SC', Arial, sans-serif;
    }
    #start-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(255,136,0,0.5), 0 3px 8px rgba(0,0,0,0.3);
    }
    #start-btn:active { transform: scale(1.05); }
    .controls {
      margin-top: 18px; font-size: 13px; color: #7ab870;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="600" height="600"></canvas>
    <div id="menu">
      <h1>🐍</h1>
      <h2>贪吃蛇·动物大战</h2>
      <button id="start-btn">🎮 开始游戏</button>
      <div class="controls">
        ⬆️⬇️⬅️➡️ / WASD 移动 | P 暂停 | R 重开
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
